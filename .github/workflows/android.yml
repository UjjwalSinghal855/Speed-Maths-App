name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x SpeedMath/SpeedMath/gradlew

      - name: Build APK
        run: cd SpeedMath/SpeedMath && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedMath-APK
          path: SpeedMath/SpeedMath/app/build/outputs/apk/debug/app-debug.apk
