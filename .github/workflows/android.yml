name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd SpeedMath/SpeedMath
          curl -s https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
          unzip gradle.zip
          ./gradle-8.5/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedMath-APK
          path: SpeedMath/SpeedMath/app/build/outputs/apk/debug/app-debug.apk
